<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 25%,#f093fb 50%,#f5576c 75%,#fda085 100%);background-size:400% 400%;animation:grad 15s ease infinite;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:15px}
@keyframes grad{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.app{width:100%;max-width:440px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.95);padding:10px 16px;border-radius:20px;box-shadow:0 8px 32px rgba(0,0.1);backdrop-filter:blur(10px)}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:white;box-shadow:0 4px 15px rgba(102,126,234,0.4)}
h1{font-size:22px;font-weight:900;background:linear-gradient(135deg,#667eea,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:rgba(255,255,255,0.95);border-radius:28px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.15);backdrop-filter:blur(20px);border:1px solid rgba(255,255,0.3)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}
.stat{background:linear-gradient(135deg,#667eea15,#f5576c15);padding:16px;border-radius:18px;text-align:center;border:2px solid transparent;background-clip:padding-box;position:relative}
.stat::before{content:'';position:absolute;inset:0;border-radius:18px;padding:2px;background:linear-gradient(135deg,#667eea,#f5576c);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.stat b{font-size:26px;background:linear-gradient(135deg,#667eea,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:block;font-weight:900}
.stat span{font-size:12px;color:#64748b;font-weight:600}
.section{font-size:13px;font-weight:800;color:#475569;margin:18px 0 10px;text-transform:uppercase;letter-spacing:0.5px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.cat{padding:14px 8px;background:white;border:2px solid #e2e8f0;border-radius:16px;text-align:center;cursor:pointer;font-size:12px;font-weight:700;transition:all.2s;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.cat:active{transform:scale(.95)}
.cat.active{border-color:transparent;background:linear-gradient(135deg,#667eea,#764ba2);color:white;box-shadow:0 8px 20px rgba(102,126,234,0.3);transform:translateY(-2px)}
.btn{width:100%;padding:16px;margin:8px 0;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:16px;color:white;font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 8px 20px rgba(102,126,234,0.3);transition:.2s}
.btn:active{transform:translateY(2px);box-shadow:0 4px 10px rgba(102,126,234,0.3)}
.btn2{background:linear-gradient(135deg,#f093fb,#f5576c);box-shadow:0 8px 20px rgba(245,87,108,0.3)}
.game-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.qinfo{background:linear-gradient(135deg,#667eea15,#764ba215);padding:8px 14px;border-radius:12px}
#qnum{font-weight:800;color:#475569;font-size:14px}
#catname{font-size:11px;color:#764ba2;font-weight:700}
.timer{width:68px;height:68px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;box-shadow:0 4px 20px rgba(0,0,0.1);border:4px solid #667eea;color:#667eea;position:relative}
.timer.warn{border-color:#f59e0b;color:#f59e0b;animation:pulse 1s infinite}
.timer.danger{border-color:#ef4444;color:#ef4444;animation:pulse.5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.progress{height:6px;background:#e2e8f0;border-radius:3px;margin:12px 0;overflow:hidden}
.progress div{height:100%;background:linear-gradient(90deg,#667eea,#f093fb,#f5576c);transition:width.3s;border-radius:3px}
.question{font-size:19px;font-weight:800;line-height:1.5;margin:18px 0;color:#1e293b;min-height:58px}
.option{padding:16px;margin:10px 0;background:white;border:2.5px solid #e2e8f0;border-radius:16px;cursor:pointer;text-align:center;font-weight:700;font-size:15px;transition:all.2s;box-shadow:0 2px 8px rgba(0,0.04);color:#334155}
.option:hover{border-color:#667eea;transform:translateY(-2px);box-shadow:0 6px 16px rgba(102,126,234,0.15)}
.option.correct{background:linear-gradient(135deg,#10b981,#059669);border-color:#10b981;color:white;transform:scale(1.02);box-shadow:0 8px 20px rgba(16,185,129,0.3)}
.option.wrong{background:linear-gradient(135deg,#ef4444,#dc2626);border-color:#ef4444;color:white;animation:shake.4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.option.disabled{opacity:.6;pointer-events:none}
.bottom{display:flex;justify-content:space-between;margin-top:18px;padding-top:14px;border-top:2px solid #f1f5f9}
.bottom span{font-size:14px;color:#64748b;font-weight:600}
.bottom b{color:#667eea;font-weight:900;font-size:18px}
.points-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:56px;font-weight:900;background:linear-gradient(135deg,#667eea,#f5576c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 4px 20px rgba(102,126,234,0.5));animation:pop 1s forwards;pointer-events:none;z-index:999}
@keyframes pop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-20%) scale(1)}}
.hidden{display:none}
.icon{width:44px;height:44px;background:rgba(255,255,0.95);border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;box-shadow:0 4px 15px rgba(0,0.1);backdrop-filter:blur(10px)}
/* 챈횜횣 찼챠찼챠 */

</style>

const AC=new(window.AudioContext||webkitAudioContext)();let soundOn=true;
function toggleSound(){soundOn=!soundOn;document.getElementById('snd').textContent=soundOn?'??':'??';if(soundOn)AC.resume()}
function snd(t){if(!soundOn)return;AC.resume();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.22,AC.currentTime);
if(t==='c'){[523,659,784,1046].forEach((f,i)=>setTimeout(()=>{const oo=AC.createOscillator(),gg=AC.createGain();oo.connect(gg);gg.connect(AC.destination);oo.frequency.value=f;gg.gain.setValueAtTime(.18,AC.currentTime);gg.gain.exponentialRampToValueAtTime(.01,AC.currentTime+.12);oo.start();oo.stop(AC.currentTime+.12)},i*70))}
if(t==='w'){o.frequency.value=160;o.type='sawtooth';g.gain.exponentialRampToValueAtTime(.01,AC.currentTime+.3);o.start();o.stop(AC.currentTime+.3)}
if(t==='t'){o.frequency.value=1100;g.gain.exponentialRampToValueAtTime(.01,AC.currentTime+.06);o.start();o.stop(AC.currentTime+.06)}
if(t==='s'){o.frequency.setValueAtTime(300,AC.currentTime);o.frequency.exponentialRampToValueAtTime(900,AC.currentTime+.22);g.gain.exponentialRampToValueAtTime(.01,AC.currentTime+.25);o.start();o.stop(AC.currentTime+.25)}
}
function vib(t){if('vibrate' in navigator){if(t==='c')navigator.vibrate([50,30,50]);else if(t==='w')navigator.vibrate(200)}}

if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');document.getElementById('theme').textContent='??'}

let cat='all',qs=[],idx=0,score=0,streak=0,time=20,timer,mode='solo',p1='찼횉횣횊1',p2='찼횉횣횊2',turn=1,p1s=0,p2s=0;
let used = JSON.parse(localStorage.getItem('quiz_used')||'[]');

function selCat(el){document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active'));el.classList.add('active');cat=el.dataset.c}
function getQs(){let base=cat==='all'?Object.entries(DB).flatMap(([k,v])=>v.map(q=>({...q,cat:k}))):DB[cat].map(q=>({...q,cat}));let pool=base.filter(q=>!used.includes(q.q));if(pool.length<10){used=[];pool=base}pool=pool.sort(()=>Math.random()-.5).slice(0,10);pool.forEach(q=>{if(!used.includes(q.q))used.push(q.q)});localStorage.setItem('quiz_used',JSON.stringify(used));return pool}
function startGame(){snd('s');mode='solo';qs=getQs();idx=0;score=0;streak=0;document.getElementById('home').classList.add('hidden');document.getElementById('game').classList.remove('hidden');next()}
function start1v1(){p1=prompt('횉횙찾 횉찼찼횉횣횊 1쩔')||'찼횉횣횊1';p2=prompt('횉횙찾 횉찼찼횉횣횊 2쩔')||'찼횉횣횊2';snd('s');mode='1v1';turn=1;p1s=0;p2s=0;qs=getQs();idx=0;score=0;streak=0;document.getElementById('home').classList.add('hidden');document.getElementById('game').classList.remove('hidden');next()}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function next(){if(idx>=qs.length)return end();clearInterval(timer);time=20;updateTimer();timer=setInterval(()=>{time--;updateTimer();if(time<=5&&time>0)snd('t');if(time<=0)answer(-1)},1000);const q=qs[idx];const opts=q.a.map((t,i)=>({t,ok:i===q.c}));shuffle(opts);q.shuffled=opts;q.newC=opts.findIndex(o=>o.ok);document.getElementById('qnum').textContent=mode==='1v1'?`${turn===1?p1:p2} 혮 ${idx+1}/10`:`${idx+1}/10`;document.getElementById('catname').textContent=q.cat;document.getElementById('qtext').textContent=q.q;document.getElementById('opts').innerHTML=opts.map((o,i)=>`<div class="option" onclick="answer(${i})">${o.t}</div>`).join('');document.getElementById('prog').style.width=`${(idx/qs.length)*100}%`;document.getElementById('score').textContent=score;document.getElementById('streak').textContent=streak}
function updateTimer(){const t=document.getElementById('timer');t.textContent=time;t.className='timer';if(time<=5)t.classList.add('danger');else if(time<=10)t.classList.add('warn')}
function answer(i){clearInterval(timer);const q=qs[idx],opts=document.querySelectorAll('.option');opts.forEach(o=>o.classList.add('disabled'));opts[q.newC].classList.add('correct');let pts=0;if(i===q.newC){snd('c');vib('c');pts=20+time;score+=pts;streak++;if(mode==='1v1')(turn===1?p1s+=pts:p2s+=pts);showPts(`+${pts}`);opts[i].classList.add('correct')}else{snd('w');vib('w');streak=0;if(i>=0)opts[i].classList.add('wrong')}setTimeout(()=>{idx++;if(mode==='1v1')turn=turn===1?2:1;next()},1200)}
function showPts(t){const d=document.createElement('div');d.className='points-popup';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),1000)}
function end(){localStorage.setItem('last',score);localStorage.setItem('best',Math.max(score,+(localStorage.getItem('best')||0)));document.getElementById('last').textContent=localStorage.getItem('last');document.getElementById('best').textContent=localStorage.getItem('best');document.getElementById('game').classList.add('hidden');document.getElementById('end').classList.remove('hidden');if(mode==='1v1'){const w=p1s>p2s?p1:p2s>p1s?p2:'횎횣횉횕찼';document.getElementById('etitle').textContent=w;document.getElementById('etext').textContent=`${p1}: ${p1s} ?? | ${p2}: ${p2s} ??`;document.getElementById('emoji').textContent=w==='횎횣횉횕찼'?'??':'??'}else{document.getElementById('etitle').textContent=`${score} 채횧횠횋`;document.getElementById('etext').textContent=`횄횒횙채횎!`;document.getElementById('emoji').textContent=score>300?'??':score>200?'??':'?'}snd('c');setTimeout(()=>snd('c'),120);setTimeout(()=>snd('c'),240)}
document.getElementById('last').textContent=localStorage.getItem('last')||0;document.getElementById('best').textContent=localStorage.getItem('best')||0;
